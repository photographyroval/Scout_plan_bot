name: Uptime check

# Пингует Railway раз в 15 минут. Если сервер не отвечает — шлёт алерт в Telegram.
#
# Зачем это нужно: все алерты внутри server.js умирают вместе с сервером. Если
# Railway ляжет целиком (упал контейнер, обслуживание платформы, кончились лимиты),
# бот физически не сможет написать — некому. Этот воркфлоу крутится на
# инфраструктуре GitHub, то есть переживает падение Railway.
#
# Секреты BOT_TOKEN и OWNER_ID берутся из GitHub Secrets (репа публичная —
# в код их класть нельзя ни в коем случае).

on:
  schedule:
    # Раз в 15 минут. ВНИМАНИЕ: GitHub запускает cron не секунда в секунду —
    # при нагрузке на их инфраструктуру запуск может задержаться на несколько
    # минут или изредка пропуститься. Для задачи "заметить простой" это нормально.
    - cron: '*/15 * * * *'
  # Позволяет запустить проверку вручную из вкладки Actions (кнопка Run workflow).
  # Удобно, чтобы протестировать сразу после настройки, не дожидаясь расписания.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway and alert on failure
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          TARGET_URL: 'https://scoutplanbot-production.up.railway.app/'
        run: |
          set -u

          # Проверка: возвращает HTTP-код или 000, если соединения нет.
          # --max-time 20 — не ждём вечно; медленный ответ тоже считаем сбоем.
          check() {
            curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$TARGET_URL" || echo "000"
          }

          CODE1=$(check)
          echo "Первая проверка: HTTP $CODE1"

          if [ "$CODE1" = "200" ]; then
            echo "Сервер отвечает — всё в порядке."
            exit 0
          fi

          # Не 200 — но не спешим паниковать. Разовый сетевой сбой или холодный
          # старт контейнера не должны поднимать ложную тревогу. Ждём 30 секунд
          # и проверяем ещё раз. Алерт шлём, только если упало дважды подряд.
          echo "Первая проверка не прошла. Жду 30 секунд и пробую снова..."
          sleep 30

          CODE2=$(check)
          echo "Повторная проверка: HTTP $CODE2"

          if [ "$CODE2" = "200" ]; then
            echo "Со второй попытки сервер ответил — разовый сбой, алерт не шлём."
            exit 0
          fi

          echo "Сервер не отвечает дважды подряд. Отправляю алерт."

          # Расшифровка кода для понятного текста в сообщении.
          if [ "$CODE2" = "000" ]; then
            REASON="сервер вообще не отвечает (нет соединения или таймаут)"
          else
            REASON="сервер ответил кодом HTTP $CODE2 вместо 200"
          fi

          # Текст собираем через printf: \n\n дают переносы строк уже внутри
          # переменной, а не в YAML (сырые переносы здесь ломают синтаксис).
          TEXT=$(printf '🔴 <b>Scout Planner — сервер недоступен</b>\n\nПинг Railway не прошёл дважды подряд: %s.\n\nПроверьте Railway → Deployments: возможно, контейнер упал, идёт передеплой или закончились лимиты.\n\n<i>Проверка выполнена GitHub Actions — она внешняя и не зависит от Railway.</i>' "$REASON")

          # Шлём напрямую в Telegram API. parse_mode=HTML — как и во всём проекте.
          # --data-urlencode обязателен: текст содержит пробелы, переносы и теги.
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${OWNER_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${TEXT}" \
            -o /dev/null

          # Помечаем запуск проваленным — он подсветится красным в списке Actions,
          # и GitHub сам пришлёт письмо о падении воркфлоу. Это резервный канал
          # на случай, если сообщение в Telegram по какой-то причине не дойдёт.
          exit 1
