<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scout Plan Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #11141a;
            --text-color: #ffffff;
            --accent-color: #df9aff; /* Лиловый */
            --button-bg: #6772ee;    /* Синий */
            --card-bg: #1b202c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--button-bg);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 12px;
            transition: opacity 0.2s ease;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-secondary {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background-color: rgba(223, 154, 255, 0.2);
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <h1>Scout_plan_bot</h1>

    <div class="card">
        <p style="margin: 0 0 8px 0; opacity: 0.7; font-size: 14px;">Статус подключения</p>
        <div id="status" class="status-badge">Инициализация...</div>
    </div>

    <button id="btn-create" class="btn">Создать новый проект</button>
    <button id="btn-list" class="btn btn-secondary">Мои проекты</button>

    <script>
        // Конфигурация бэкенда
        const BACKEND_URL = 'https://scoutplanbot-production.up.railway.app';

        // Безопасная инициализация Telegram WebApp
        let tg = {
            ready: () => {},
            expand: () => {},
            close: () => {},
            HapticFeedback: { impactOccurred: () => {}, notificationOccurred: () => {} },
            initDataUnsafe: { user: { id: "00000000", first_name: "Пользователь" } }
        };

        // Если запущено внутри Telegram, подменяем заглушку на реальный объект
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            document.getElementById('status').innerText = 'Запущено в Telegram';
        } else {
            document.getElementById('status').innerText = 'Режим браузера (Демо)';
        }

        // Функции тактильной отдачи (вибрации)
        function haptic(type = 'medium') {
            try {
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
            } catch (e) {
                console.log('Haptic error:', e);
            }
        }

        // Обработчики кликов
        document.getElementById('btn-create').addEventListener('click', function() {
            haptic('medium');
            alert('Клик сработал: Создание проекта');
            
            // Пример отправки запроса на бэкенд
            fetch(`${BACKEND_URL}/api/projects`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: tg.initDataUnsafe?.user?.id })
            })
            .then(res => res.json())
            .then(data => console.log('Успех:', data))
            .catch(err => console.error('Ошибка бэкенда:', err));
        });

        document.getElementById('btn-list').addEventListener('click', function() {
            haptic('light');
            alert('Клик сработал: Список проектов');
        });
    </script>
</body>
</html>
