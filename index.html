<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Scout Planner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ── THEME ── */
:root {
  --bg: #f5f5f7;
  --bg2: #e9e9eb;
  --text: #1a1a1a;
  --text2: #8e8e93;
  --accent: #2481cc;
  --card: #ffffff;
  --border: #e4e4e6;
  --green: #27ae60;
  --red: #e74c3c;
  --orange: #e67e22;
  --shadow: rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg: #1c1c1e;
  --bg2: #2c2c2e;
  --text: #f2f2f7;
  --text2: #8e8e93;
  --accent: #3b9ded;
  --card: #2c2c2e;
  --border: #3a3a3c;
  --shadow: rgba(0,0,0,0.25);
}
html,body{width:100%;margin:0;padding:0;background-color:var(--bg);color:var(--text);box-sizing:border-box;transition:background-color 0.3s,color 0.3s;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;padding:16px;overflow-x:hidden;overflow-y:auto;-webkit-tap-highlight-color:transparent;}
body.sheet-open{overflow:hidden!important;}
*{box-sizing:border-box;}
.app-wrapper{width:100%;position:relative;z-index:1;}

/* ── THEME TOGGLE ── */
.top-bar{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:20px;}
.top-bar .header{margin:0;font-size:22px;font-weight:700;}
.theme-toggle{position:absolute;left:0;display:flex;align-items:center;gap:8px;}
.toggle-track{width:44px;height:26px;background:var(--bg2);border-radius:13px;position:relative;cursor:pointer;transition:background 0.3s;border:1.5px solid var(--border);}
.toggle-track.on{background:var(--accent);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.toggle-track.on .toggle-thumb{transform:translateX(18px);}
.toggle-icon{font-size:14px;}

/* ── SCREENS ── */
.screen{display:none;width:100%;}
.screen.active{display:block;}

/* ── HEADER ── */
.header{font-size:22px;font-weight:700;text-align:center;}
.screen-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.btn-back{background:var(--bg2);border:none;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);}
.screen-header .header{flex:1;margin:0;}

/* ── TABS ── */
.tabs-container{display:flex;background:var(--bg2);padding:4px;border-radius:12px;margin-bottom:20px;}
.tab{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:600;color:var(--text2);border-radius:9px;cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--card);color:var(--accent);box-shadow:0 2px 8px var(--shadow);font-weight:700;}

/* ── FORMS ── */
.form-group{margin-bottom:14px;position:relative;width:100%;}
.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:var(--text);opacity:0.85;}
.form-input{width:100%;background:var(--bg2);border:1.5px solid transparent;padding:12px 14px;border-radius:10px;font-size:15px;color:var(--text);outline:none;display:block;transition:border-color 0.2s,background 0.3s;}
.form-input:focus{border-color:var(--accent);}
.time-warning{display:none;font-size:12px;color:var(--orange);margin-top:4px;font-weight:500;}

/* ── SECTION BLOCKS ── */
.section-block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px var(--shadow);transition:background 0.3s,border-color 0.3s;}
.section-block-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;}

/* ── BUTTONS ── */
.btn-primary{display:block;width:100%;background:var(--accent);color:#fff;border:none;padding:15px;border-radius:14px;font-size:15px;font-weight:600;text-align:center;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
.btn-primary:active{transform:scale(0.98);opacity:0.9;}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed;}
.btn-green{background:var(--green)!important;}
.btn-outline{display:block;width:100%;background:transparent;color:var(--accent);border:1.5px solid var(--accent);padding:14px;border-radius:14px;font-size:15px;font-weight:600;text-align:center;cursor:pointer;transition:background 0.15s;}
.btn-outline:active{background:rgba(36,129,204,0.08);}
.btn-secondary{background:transparent;color:var(--accent);border:none;padding:12px;font-size:14px;font-weight:600;cursor:pointer;display:block;margin:8px auto 0;}
.action-buttons{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
.form-row{display:flex;gap:12px;width:100%;}
.form-row .form-group{flex:1;}
.checkbox-container{display:flex;align-items:center;gap:10px;margin:10px 0;cursor:pointer;}
.checkbox-container input{width:20px;height:20px;accent-color:var(--accent);flex-shrink:0;}
.hidden-field{display:none;}

/* ── FILE UPLOAD ── */
.file-upload-btn{display:inline-block;background:var(--bg2);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);}
.preview-container{position:relative;width:90px;height:90px;margin-top:10px;display:none;}
.preview-img{width:100%;height:100%;object-fit:cover;border-radius:10px;box-shadow:0 4px 12px var(--shadow);}
.btn-remove-photo{position:absolute;top:-6px;right:-6px;width:22px;height:22px;background:#eb5757;color:#fff;border-radius:50%;border:2px solid var(--card);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ── DRAFT BANNER ── */
.draft-banner{background:#fff3cd;border:1px solid #ffeeba;color:#856404;padding:12px 14px;border-radius:12px;margin-bottom:14px;font-size:13px;display:none;align-items:center;justify-content:space-between;gap:10px;}
[data-theme="dark"] .draft-banner{background:#3a2e00;border-color:#5a4600;color:#ffd860;}
.draft-banner button{background:#856404;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}

/* ── PROJECT CARDS ── */
.project-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;box-shadow:0 2px 8px var(--shadow);overflow:hidden;transition:box-shadow 0.2s,background 0.3s;}
.project-card:active{box-shadow:0 1px 3px var(--shadow);}
.project-card-body{padding:14px 14px 10px;cursor:pointer;}
.project-card-title{font-weight:700;font-size:16px;margin-bottom:3px;color:var(--text);}
.project-card-meta{font-size:12px;color:var(--text2);margin-bottom:5px;}
.project-card-info{font-size:13px;color:var(--text);margin-bottom:2px;}
.project-card-return{font-size:13px;font-weight:600;color:var(--accent);}
.project-card-actions{border-top:1px solid var(--border);display:flex;align-items:center;}
.card-action-btn{flex:1;background:none;border:none;padding:11px 6px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;text-align:center;}
.card-action-btn.danger{color:var(--red);}
.card-divider{width:1px;height:32px;background:var(--border);}
.empty-state{text-align:center;color:var(--text2);margin:40px 0;font-size:15px;}

/* ── CTX MENU ── */
.ctx-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:88888;display:none;}
.ctx-menu{position:fixed;background:var(--card);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.22);z-index:88889;min-width:210px;overflow:hidden;display:none;border:1px solid var(--border);}
.ctx-item{padding:13px 18px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;color:var(--text);}
.ctx-item:last-child{border-bottom:none;}
.ctx-item:active{background:var(--bg2);}
.ctx-item.danger{color:var(--red);}

/* ── BUILDER ── */
.builder-header-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:3px;color:var(--text);}
.builder-header-date{font-size:15px;font-weight:600;text-align:center;color:var(--text2);margin-bottom:18px;}
.section-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 8px;text-align:center;}

/* ── TRANSPORT CARD ── */
.transport-card{display:flex;gap:12px;align-items:stretch;}
.transport-info{flex:1;display:flex;flex-direction:column;gap:5px;}
.transport-info-row{font-size:13px;color:var(--text);line-height:1.5;}
.transport-info-row b{font-weight:700;}
.transport-info-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.transport-photo{width:90px;flex-shrink:0;border-radius:10px;overflow:hidden;background:var(--bg2);display:none;}
.transport-photo.has-img{display:block;}
.transport-photo img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── SUMMARY ── */
.summary-section{background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:10px;transition:background 0.3s;}
.summary-two-col{display:flex;gap:10px;}
.summary-col{flex:1;display:flex;flex-direction:column;gap:8px;}
.summary-col-right{border-left:1px solid var(--border);padding-left:12px;}
.summary-item-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px;}
.summary-item-value{font-size:14px;font-weight:600;color:var(--text);}
.summary-time-value{font-size:22px;font-weight:800;}
.summary
